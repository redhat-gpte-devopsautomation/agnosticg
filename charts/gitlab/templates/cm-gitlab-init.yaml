kind: ConfigMap
metadata:
  name:  cm-init-gitlab
  annotations:
    argocd.argoproj.io/sync-wave: "3"
apiVersion: v1
data:
  playbook.yaml: |
    ---
    - name: Configure GitLab
      hosts: localhost
      vars:
        gitlab_namespace: {{ $.Release.Namespace }}
        root_password: {{ $.Values.gitlab.rootPassword }}
        user_create: true
      tasks:
        - name: Pause for 5 minutes waiting for GitLab
          ansible.builtin.pause:
            minutes: 5

        - name: Check GitLab Liveness
          ansible.builtin.uri:
            url: https://{{ $.Values.gitlab.host }}/api/v4/projects
            method: GET
            validate_certs: false
          register: r_liveness
          retries: 40
          delay: 15
          until: r_liveness.status == 200

        - name: Generate root user personal token
          shell: |
            POD=$(oc get pod -l app=gitlab -n gitlab --no-headers | awk '{print $1}')
            oc exec $POD -n {{ $.Release.Namespace }} -- /bin/sh -c /scripts/create-root-pat.sh
            ROOT_PAT=$(oc exec $POD -n {{ $.Release.Namespace }} -- /bin/sh -c "cat /tmp/root.pat")
            oc delete secret root-user-personal-token -n {{ $.Release.Namespace }} --ignore-not-found
            oc create secret generic root-user-personal-token --from-literal=token=$ROOT_PAT -n {{ $.Release.Namespace }}
          register: r_generate_token
          retries: 40
          delay: 15
          until: r_generate_token.rc == 0

        - name: Retrieve root token
          kubernetes.core.k8s_info:
            api_version: v1
            kind: Secret
            name: root-user-personal-token
            namespace: {% raw %}'{{ gitlab_namespace }}'{% endraw %}
          register: r_root_token
          retries: 40
          delay: 15
          until:
            - r_root_token.resources | length > 0
            - r_root_token.resources[0].data.token | length > 0

        - name: Debug root token retrieval
          debug:
            msg: "Successfully retrieved root token from secret"

        - name: Decode root token
          set_fact:
            root_token: {% raw %}'{{ r_root_token.resources[0].data.token | b64decode }}'{% endraw %}

        - name: Update application settings
          ansible.builtin.uri:
            url: https://{{ $.Values.gitlab.host }}/api/v4/application/settings
            method: PUT
            body_format: form-urlencoded
            body:
              import_sources: "git,github,gitea"
              version_check_enabled: "false"
              allow_local_requests_from_web_hooks_and_services: "true"
              auto_devops_enabled: "false"
            headers:
              PRIVATE-TOKEN: {% raw %}'{{ root_token }}'{% endraw %}
            validate_certs: false
            status_code: 200
          register: r_app_settings
          retries: 40
          delay: 15
          until: r_app_settings.status == 200

        - name: Create users (idempotent)
          ansible.builtin.uri:
            url: https://{{ $.Values.gitlab.host }}/api/v4/users
            method: POST
            body_format: form-urlencoded
            body:
              admin: false
              email: {{ $.Values.gitlab.users.base }}{% raw %}{{ item }}{% endraw %}@demo.redhat.com
              public_email: {{ $.Values.gitlab.users.base }}{% raw %}{{ item }}{% endraw %}@demo.redhat.com
              skip_confirmation: true
              username: {{ $.Values.gitlab.users.base }}{% raw %}{{ item }}{% endraw %}
              password: {{ $.Values.gitlab.users.password }}
              name: {% raw %}"{{ '{% endraw %}{{ $.Values.gitlab.users.base }}{% raw %}' | capitalize }}{{ item }} GitLab"{% endraw %}
            headers:
              PRIVATE-TOKEN: {% raw %}'{{ root_token }}'{% endraw %}
            validate_certs: false
            status_code:
              - 201  # Created
              - 409  # Conflict - user already exists
          register: r_user
          retries: 40
          delay: 15
          until: r_user.status in [201, 409]
          loop: {% raw %}'{{ range(1, {% endraw %}{{ $.Values.gitlab.users.count }}{% raw %} + 1) | list }}'{% endraw %}

        - name: List users
          ansible.builtin.uri:
            url: https://{{ $.Values.gitlab.host }}/api/v4/users?per_page=100
            method: GET
            headers:
              PRIVATE-TOKEN: {% raw %}'{{ root_token }}'{% endraw %}
            validate_certs: false
            status_code: 200
          register: r_users
          retries: 40
          delay: 15
          until: r_users.status == 200

{{- range $item := .Values.gitlab.groups }}

        - name: Check if group {{ $item.name }} exists
          ansible.builtin.uri:
            url: https://{{ $.Values.gitlab.host }}/api/v4/groups/{{ $item.name }}
            method: GET
            headers:
              PRIVATE-TOKEN: {% raw %}'{{ root_token }}'{% endraw %}
            validate_certs: false
            status_code:
              - 200  # Group exists
              - 404  # Group does not exist
          register: r_group_check
          retries: 40
          delay: 15
          until: r_group_check.status in [200, 404]

        - name: Create group {{ $item.name }} (if not exists)
          ansible.builtin.uri:
            url: https://{{ $.Values.gitlab.host }}/api/v4/groups
            method: POST
            body_format: form-urlencoded
            body:
              name: {{ $item.name }}
              path: {{ $item.name }}
              visibility: public
            headers:
              PRIVATE-TOKEN: {% raw %}'{{ root_token }}'{% endraw %}
            validate_certs: false
            status_code: 201
          register: r_group_create
          retries: 40
          delay: 15
          until: r_group_create.status == 201
          when: r_group_check.status == 404

        - name: Set group fact for {{ $item.name }}
          set_fact:
            r_group: {% raw %}'{{ r_group_create if r_group_check.status == 404 else r_group_check }}'{% endraw %}

        - name: List projects in group {{ $item.name }}
          ansible.builtin.uri:
            url: https://{{ $.Values.gitlab.host }}/api/v4/groups/{% raw %}{{ r_group.json.id }}{% endraw %}/projects?per_page=100
            method: GET
            headers:
              PRIVATE-TOKEN: {% raw %}'{{ root_token }}'{% endraw %}
            validate_certs: false
            status_code: 200
          register: r_group_projects
          retries: 40
          delay: 15
          until: r_group_projects.status == 200
          when: {{ ($item.repo | default (list) | len) }} > 0

        - name: Import repository to group {{ $item.name }} (idempotent)
          ansible.builtin.uri:
            url: https://{{ $.Values.gitlab.host }}/api/v4/projects
            method: POST
            body_format: form-urlencoded
            body:
              name: {% raw %}'{{ item.name }}'{% endraw %}

              import_url: {% raw %}'{{ item.url }}'{% endraw %}

              visibility: public
              namespace_id: {% raw %}'{{ r_group.json.id }}'{% endraw %}
            headers:
              PRIVATE-TOKEN: {% raw %}'{{ root_token }}'{% endraw %}
            validate_certs: false
            status_code:
              - 201  # Created
              - 400  # Bad request - might already exist
          register: r_import
          retries: 40
          delay: 15
          until: r_import.status in [201, 400]
          loop: {{ ($item.repo | default (list)) | toYaml | nindent 12 }}
          when:
            - {{ ($item.repo | default (list) | len) }} > 0
            - item.name not in (r_group_projects.json | map(attribute='name') | list)

        - name: Add user to group {{ $item.name }} (idempotent)
          when: item.username.startswith('{{ $.Values.gitlab.users.base }}')
          ansible.builtin.uri:
            url: https://{{ $.Values.gitlab.host }}/api/v4/groups/{% raw %}{{ r_group.json.id }}{% endraw %}/members
            method: POST
            body_format: form-urlencoded
            body:
              user_id: {% raw %}'{{ item.id }}'{% endraw %}
              access_level: 50
            headers:
              PRIVATE-TOKEN: {% raw %}'{{ root_token }}'{% endraw %}
            validate_certs: false
            status_code:
              - 201  # Created
              - 409  # Conflict - already a member
          register: r_group_user
          retries: 40
          delay: 15
          until: r_group_user.status in [201, 409]
          loop: {% raw %}'{{ r_users.json }}'{% endraw %}
{{- end }}
